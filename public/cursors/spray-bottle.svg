<?xml version="1.0" encoding="UTF-8"?>
<!--
  Original cursor art: yellow glove + teal trigger spray bottle mascot
  (white sticker halo, navy outline, sparkle). Inspired by client reference.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bottle-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ed8ee"/>
      <stop offset="45%" stop-color="#2db9d4"/>
      <stop offset="100%" stop-color="#1599b8"/>
    </linearGradient>
    <linearGradient id="bottle-shine" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glove-fill" x1="0%" y1="0%" x2="95%" y2="95%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="100%" stop-color="#f4c542"/>
    </linearGradient>
  </defs>

  <g transform="translate(8 10) rotate(-38 56 70)">
    <!-- Bottle body (back) -->
    <path
      d="M56 62 L56 98 Q56 118 74 118 Q92 118 92 98 L92 62 L88 56 L60 56 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="5.5"
      stroke-linejoin="round"
    />
    <path
      d="M56 62 L56 98 Q56 118 74 118 Q92 118 92 98 L92 62 L88 56 L60 56 Z"
      fill="url(#bottle-fill)"
      stroke="#0f2332"
      stroke-width="2.4"
      stroke-linejoin="round"
    />
    <path d="M60 66 L60 96 Q60 112 74 112 Q88 112 88 96 L88 68 Z" fill="url(#bottle-shine)"/>

    <!-- Decal + sparkle -->
    <path
      d="M66 82 Q76 76 82 86 Q86 94 78 98 Q72 94 72 88 Q72 84 66 82"
      fill="#ffffff"
      fill-opacity="0.95"
      stroke="#0f2332"
      stroke-width="0.95"
      stroke-linejoin="round"
    />
    <path
      d="M84 72 L86 68 L88 72 L92 70 L90 74 L92 78 L88 76 L86 80 L84 76 L80 78 Z"
      fill="#ffffff"
      stroke="#0f2332"
      stroke-width="0.85"
      stroke-linejoin="round"
    />

    <!-- Glove hand (wraps left side / neck) -->
    <path
      d="M6 76 C2 62 8 40 26 34 C34 32 46 36 52 44 L56 52 C50 54 46 60 48 70 C50 86 44 98 32 102 C18 106 8 94 6 76 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="5.5"
      stroke-linejoin="round"
    />
    <path
      d="M6 76 C2 62 8 40 26 34 C34 32 46 36 52 44 L56 52 C50 54 46 60 48 70 C50 86 44 98 32 102 C18 106 8 94 6 76 Z"
      fill="url(#glove-fill)"
      stroke="#0f2332"
      stroke-width="2.4"
      stroke-linejoin="round"
    />
    <path d="M16 52 Q22 46 30 48" fill="none" stroke="#c99716" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
    <path d="M12 66 Q20 58 28 62" fill="none" stroke="#c99716" stroke-width="1.15" stroke-linecap="round" opacity="0.65"/>

    <!-- Neck -->
    <rect x="62" y="44" width="24" height="14" rx="2.5" fill="none" stroke="#ffffff" stroke-width="5.5"/>
    <rect x="62" y="44" width="24" height="14" rx="2.5" fill="#3ac4dc" stroke="#0f2332" stroke-width="2.4"/>

    <!-- Spray head -->
    <path
      d="M58 44 L58 24 Q58 14 70 14 L78 14 Q90 14 90 24 L90 44 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="5.5"
      stroke-linejoin="round"
    />
    <path
      d="M58 44 L58 24 Q58 14 70 14 L78 14 Q90 14 90 24 L90 44 Z"
      fill="#47cce4"
      stroke="#0f2332"
      stroke-width="2.4"
      stroke-linejoin="round"
    />

    <!-- Trigger -->
    <path
      d="M58 28 L40 33 L38 44 L56 40 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="5.5"
      stroke-linejoin="round"
    />
    <path
      d="M58 28 L40 33 L38 44 L56 40 Z"
      fill="#2aa8c4"
      stroke="#0f2332"
      stroke-width="2.4"
      stroke-linejoin="round"
    />

    <!-- Nozzle housing + black tip (cursor hotspot ≈ tip) -->
    <rect x="68" y="4" width="12" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="5"/>
    <rect x="68" y="4" width="12" height="12" rx="2" fill="#2aa8c4" stroke="#0f2332" stroke-width="2.2"/>
    <rect x="71" y="-1" width="6" height="7" rx="1.2" fill="#1a1a1e" stroke="#0f2332" stroke-width="1.2"/>
  </g>
</svg>
